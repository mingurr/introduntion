<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Introduction</title>
    <link rel="stylesheet" href="./style.css" />
    <script
      src="https://kit.fontawesome.com/1a290abd05.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <main>
      <section>
        <div class="decorations">
          <h1 class="text-preset-1">
            <span>Hi, I'm <span class="name">Min</span>,</span>
            <span>A Frontend Developer!</span>
          </h1>

          <img
            class="decoration-img"
            src="./assets/front.png"
            alt="doodle image"
          />
        </div>
        <div class="stats">
          <div class="about">
            <div class="title text-preset-2">About</div>
            <p class="text-preset-3">
              안녕하세요, 김민경입니다. 3년간 영어 강사로 일했고, 지금은
              프론트엔드 개발자로 성장하기 위해 하나씩 배워가고 있습니다.
            </p>
            <p class="text-preset-3">
              집에서 책을 읽거나 영화를 보는 걸 좋아하고, 수영을 하며
              리프레시하는 시간을 즐깁니다.
            </p>
          </div>
          <div class="skills">
            <div class="title text-preset-2">Skills</div>
            <div class="icons-container">
              <img src="./assets/icons/html.svg" alt="html icon" />
              <img src="./assets/icons/css.svg" alt="css icon" />
              <img
                src="./assets/icons/free-icon-js-5968292.png"
                alt="js icon"
              />
              <img src="./assets/icons/react.svg" alt="react icon" />
            </div>
          </div>
          <div class="languages">
            <div class="title text-preset-2">Languages</div>
            <div class="icons-container text-preset-3">
              <p>Korean</p>
              <p>English</p>
              <p>Japanese</p>
            </div>
          </div>
          <div class="contacts">
            <div class="title text-preset-2">Contact</div>
            <div class="icons-container">
              <a href="https://github.com/mingurr"
                ><i class="fa-brands fa-github"></i
              ></a>
              <a href="https://www.linkedin.com/in/minkyung-kim-3a144b12b/"
                ><i class="fa-brands fa-linkedin"></i
              ></a>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
